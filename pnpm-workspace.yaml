packages:
  - 'packages/@repo/*'
  - 'packages/@sanity/cli'
  - 'packages/@sanity/cli-core'
  - 'packages/@sanity/cli-test'
  - 'packages/@sanity/eslint-config-cli'
  - 'packages/create-sanity'
  - 'fixtures/*'
  - 'tmp/*'

catalog:
  # Linting
  eslint: ^9.39.2
  '@eslint/compat': ^2.0.2
  publint: ^0.3.17
  prettier: ^3.8.1

  # Sanity
  sanity: ^5.9.0
  '@sanity/vision': ^5.9.0
  '@sanity/types': ^5.9.0
  '@sanity/schema': ^5.9.0
  '@sanity/client': ^7.14.1
  '@sanity/codegen': ^5.9.3
  '@sanity/telemetry': ^0.8.1

  # Build & Development Tools
  typescript: ^5.9.3
  vite: ^7.3.1
  tsx: ^4.21.0
  '@vitejs/plugin-react': ^5.1.3

  # Testing
  vitest: ^4.0.18
  '@vitest/coverage-istanbul': ^4.0.18
  nock: ^14.0.10

  # CLI Framework
  '@oclif/core': ^4.8.0
  '@oclif/plugin-help': ^6.2.37
  '@oclif/plugin-not-found': ^3.2.74

  # Utilities
  debug: ^4.4.3
  jsdom: ^27.4.0
  zod: ^4.3.6
  'get-tsconfig': ^4.13.6
  execa: ^9.6.0
  ora: ^9.0.0
  rxjs: ^7.8.2
  tinyglobby: ^0.2.15

  # Build Tools
  '@swc/core': ^1.15.11
  '@swc/cli': ^0.8.0
  rimraf: ^6.0.1
  '@sanity/pkg-utils': ^10.4.4

  # Type Definitions
  '@types/node': ^20.19.33
  '@types/debug': ^4.1.12
  '@types/jsdom': ^27.0.0

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@portabletext/*'
  - '@sanity/*'
  - 'groq-js'
  - 'groq'
  - 'react-rx'
  - 'sanity'
  - 'use-effect-event'
