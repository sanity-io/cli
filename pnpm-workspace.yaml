linkWorkspacePackages: true

packages:
  - 'packages/@repo/*'
  - 'packages/@sanity/cli'
  - 'packages/@sanity/cli-core'
  - 'packages/@sanity/cli-test'
  - 'packages/@sanity/eslint-config-cli'
  - 'packages/create-sanity'
  - 'fixtures/*'
  - 'tmp/*'

catalog:
  # Linting
  eslint: ^10.1.0
  '@eslint/compat': ^2.0.3
  publint: ^0.3.18

  # Sanity
  sanity: ^5.18.0
  '@sanity/vision': ^5.18.0
  '@sanity/types': ^5.18.0
  '@sanity/schema': ^5.18.0
  '@sanity/client': ^7.20.0
  '@sanity/codegen': ^6.0.2
  '@sanity/telemetry': ^0.9.0

  # Build & Development Tools
  typescript: ^5.9.3
  vite: ^7.3.1
  tsx: ^4.21.0
  '@vitejs/plugin-react': ^5.2.0

  # Testing
  vitest: ^4.1.2
  '@vitest/coverage-istanbul': ^4.1.2
  nock: ^14.0.11

  # CLI Framework
  '@oclif/core': ^4.10.3
  '@oclif/plugin-help': ^6.2.41
  '@oclif/plugin-not-found': ^3.2.78

  # Utilities
  debug: ^4.4.3
  jsdom: ^29.0.1
  zod: ^4.3.6
  'get-tsconfig': ^4.13.7
  'import-meta-resolve': ^4.2.0
  execa: ^9.6.0
  read-package-up: ^12.0.0
  ora: ^9.0.0
  rxjs: ^7.8.2
  tinyglobby: ^0.2.15
  lodash-es: ^4.18.1
  '@types/lodash-es': ^4.17.12
  yaml: ^2.8.3

  # Build Tools
  '@swc/core': ^1.15.24
  '@swc/cli': ^0.8.1
  rimraf: ^6.0.1
  '@sanity/pkg-utils': ^10.4.13
  oxfmt: ^0.43.0

  # Type Definitions
  '@types/node': ^20.19.37
  '@types/debug': ^4.1.13
  '@types/jsdom': ^28.0.1

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@portabletext/*'
  - '@sanity/*'
  - '@types/*'
  - 'groq-js'
  - 'groq'
  - 'lodash-es'
  - 'react-rx'
  - 'sanity'
  - 'use-effect-event'
  - 'oxfmt'
  - '@oxfmt/*'
  # Bump for oclif with `--no-source-links` support, can remove after ~Apr 11th
  - 'oclif@4.23.0'
