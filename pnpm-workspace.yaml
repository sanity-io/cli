linkWorkspacePackages: true

packages:
  - 'packages/@repo/*'
  - 'packages/@sanity/cli'
  - 'packages/@sanity/cli-build'
  - 'packages/@sanity/cli-core'
  - 'packages/@sanity/cli-e2e'
  - 'packages/@sanity/cli-test'
  - 'packages/@sanity/eslint-config-cli'
  - 'packages/create-sanity'
  - 'fixtures/*'
  - 'tmp/*'

catalog:
  # Linting
  eslint: ^10.4.1
  '@eslint/compat': ^2.1.0
  publint: ^0.3.21

  # GROQ
  groq-js: ^1.30.2

  # Sanity
  sanity: ^6.0.0
  '@sanity/vision': ^6.0.0
  '@sanity/types': ^6.0.0
  '@sanity/schema': ^6.0.0
  '@sanity/client': ^7.22.1
  '@sanity/codegen': ^7.0.1
  '@sanity/telemetry': ^1.1.0

  # Build & Development Tools
  babel-plugin-react-compiler: ^1.0.0
  typescript: ^5.9.3
  vite: ^8.0.16
  vite-node: ^6.0.0
  '@vitejs/plugin-react': ^6.0.2
  tsx: ^4.22.4

  # Testing
  vitest: ^4.1.8
  '@vitest/coverage-istanbul': ^4.1.8
  nock: ^14.0.15
  node-pty: ^1.1.0
  dotenv: ^17.4.2
  strip-ansi: ^7.1.0

  # CLI Framework
  '@oclif/core': ^4.11.4
  '@oclif/plugin-help': ^6.2.50
  '@oclif/plugin-not-found': ^3.2.87

  # Utilities
  debug: ^4.4.3
  jsdom: ^29.1.1
  zod: ^4.4.3
  'get-tsconfig': ^4.14.0
  'import-meta-resolve': ^4.2.0
  execa: ^9.6.0
  read-package-up: ^12.0.0
  ora: ^9.0.0
  rxjs: ^7.8.2
  tinyglobby: ^0.2.17
  lodash-es: ^4.18.1
  '@types/lodash-es': ^4.17.12
  yaml: ^2.9.0

  # Build Tools
  '@swc/core': ^1.15.40
  '@swc/cli': ^0.8.1
  rimraf: ^6.0.1
  '@sanity/pkg-utils': ^10.5.3
  oxfmt: ^0.53.0

  # Type Definitions
  '@types/node': ^20.19.41
  '@types/debug': ^4.1.13
  '@types/jsdom': ^28.0.3

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@portabletext/*'
  - '@sanity/*'
  - '@types/*'
  - 'groq-js'
  - 'groq'
  - 'lodash-es'
  - 'react-rx'
  - 'sanity'
  - 'use-effect-event'
  - 'dotenv'
  - 'oxfmt'
  - '@oxfmt/*'
  - 'vite'
  - '@vitejs/*'
  - 'vitest'
  - '@vitest/*'
  # Bump for jiti with ts path support, can remove after ~May 9th
  - 'jiti@2.7.0'
  # Renovate security update: turbo@2.9.14
  - turbo@2.9.14
