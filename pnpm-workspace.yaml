linkWorkspacePackages: true

packages:
  - 'packages/@repo/*'
  - 'packages/@sanity/cli'
  - 'packages/@sanity/cli-build'
  - 'packages/@sanity/cli-core'
  - 'packages/@sanity/cli-e2e'
  - 'packages/@sanity/cli-test'
  - 'packages/@sanity/eslint-config-cli'
  - 'packages/@sanity/workbench-cli'
  - 'packages/create-sanity'
  - 'fixtures/*'
  - 'tmp/*'

catalog:
  # Linting
  eslint: ^10.7.0
  '@eslint/compat': ^2.1.0
  publint: ^0.3.21

  # GROQ
  groq-js: ^1.30.2

  # Sanity
  sanity: ^6.1.0
  '@sanity/vision': ^6.1.0
  '@sanity/types': ^6.1.0
  '@sanity/schema': ^6.1.0
  '@sanity/client': ^7.23.0
  '@sanity/codegen': ^7.0.3
  '@sanity/telemetry': ^1.1.0

  # Build & Development Tools
  babel-plugin-react-compiler: ^1.0.0
  typescript: ^5.9.3
  vite: ^8.1.3
  vite-node: ^6.0.0
  '@vitejs/plugin-react': ^6.0.3
  tsx: ^4.22.4

  # Testing
  vitest: ^4.1.9
  '@vitest/coverage-istanbul': ^4.1.9
  nock: ^14.0.15
  node-pty: ^1.1.0
  dotenv: ^17.4.2
  strip-ansi: ^7.1.0

  # CLI Framework
  '@oclif/core': ^4.11.7
  '@oclif/plugin-help': ^6.2.52
  '@oclif/plugin-not-found': ^3.2.87

  # Utilities
  debug: ^4.4.3
  jsdom: ^29.1.1
  zod: ^4.4.3
  'get-tsconfig': ^4.14.0
  'import-meta-resolve': ^4.2.0
  execa: ^9.6.0
  empathic: ^2.0.1
  ora: ^9.0.0
  rxjs: ^7.8.2
  tinyglobby: ^0.2.17
  lodash-es: ^4.18.1
  '@types/lodash-es': ^4.17.12
  yaml: ^2.9.0
  form-data: ^4.0.5
  tar-fs: ^3.1.2

  # Build Tools
  '@swc/core': ^1.15.43
  '@swc/cli': ^0.8.1
  rimraf: ^6.0.1
  '@sanity/pkg-utils': ^10.8.1
  oxfmt: ^0.56.0

  # Type Definitions
  '@types/node': ^22.20.0
  '@types/debug': ^4.1.13
  '@types/jsdom': ^28.0.3
  '@types/tar-fs': ^2.0.4

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@portabletext/*'
  - '@sanity/*'
  - '@types/*'
  - 'groq-js'
  - 'groq'
  - 'lodash-es'
  - 'react-rx'
  - 'sanity'
  - 'sanity-plugin-media'
  - 'use-effect-event'
  - 'dotenv'
  - 'oxfmt'
  - '@oxfmt/*'
  - 'vite'
  - '@vitejs/*'
  # Vite's bundler; same trust domain and release cadence as vite itself.
  # Needed so vite's `rolldown: ~x.y.z` range can pick up fresh patch fixes.
  # `@rolldown/*` covers the per-platform native binding packages released in
  # lockstep with `rolldown`.
  - 'rolldown'
  - '@rolldown/*'
  - 'vitest'
  - 'postcss'
  - '@module-federation/vite@1.16.14'
  - '@module-federation/dts-plugin@2.7.0'
  - '@module-federation/error-codes@2.7.0'
  - '@module-federation/managers@2.7.0'
  - '@module-federation/runtime@2.7.0'
  - '@module-federation/runtime-core@2.7.0'
  - '@module-federation/sdk@2.7.0'
  - '@module-federation/third-party-dts-extractor@2.7.0'
  - '@vitest/*'
  # Bump for jiti with ts path support, can remove after ~May 9th
  - 'jiti@2.7.0'
  # Renovate security update: turbo@2.9.14
  - turbo@2.9.14
  # Renovate security update: tar@7.5.16
  - tar@7.5.16
  # Renovate security update: esbuild@0.28.1
  - esbuild@0.28.1
  # Renovate security update: form-data@4.0.6
  - form-data@4.0.6
