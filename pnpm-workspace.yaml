packages:
  - 'packages/@repo/*'
  - 'packages/@sanity/cli'
  - 'packages/@sanity/cli-core'
  - 'packages/@sanity/cli-test'
  - 'packages/@sanity/codegen'
  - 'packages/@sanity/migrate'
  - 'packages/create-sanity'
  - 'examples/*'
  - 'tmp/*'

catalog:
  eslint: ^9.39.1
  '@eslint/compat': ^1.4.1

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@portabletext/*'
  - '@sanity/*'
  - 'groq-js'
  - 'react-rx'
  - 'sanity'
  - 'use-effect-event'
