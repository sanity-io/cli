name: Snapshot Release

on:
  push:
    branches:
      # Note: this needs to be removed before the feature branch gets merged to main
      - feat/workbench
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag for the snapshot release'
        required: false
        # TODO: revert to "snapshot" before the feature branch gets merged to main
        default: 'workbench'
        type: string
      forceBump:
        description: 'Force a version bump for all packages'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # for pushing version commits and creating GH releases when forceBump is used
  id-token: write # OIDC for npm provenance

jobs:
  snapshot:
    name: Snapshot Release
    runs-on: ubuntu-latest

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ECOSPARK_APP_ID }}
          private-key: ${{ secrets.ECOSPARK_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: false

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          node-version: 20

      - name: Configure npm registry
        run: echo '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > .npmrc
      - name: Create snapshot versions
        run: pnpm changeset version --snapshot
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Build packages
        run: pnpm run build:cli

      - name: Publish snapshot packages
        run: pnpm changeset publish --tag "workbench" 2>&1 | tee publish-output.txt
        env:
          DIST_TAG: ${{ inputs.tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
