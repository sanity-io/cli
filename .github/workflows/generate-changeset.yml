name: Generate changeset from PR

on:
  pull_request_target:
    types: [opened, edited, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  generate-changeset:
    name: Generate changeset
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'squiggler-app[bot]'
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ECOSPARK_APP_ID }}
          private-key: ${{ secrets.ECOSPARK_APP_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 2
          persist-credentials: false

      - name: Checkout base branch scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          sparse-checkout: .github/scripts
          path: base-scripts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate or remove changeset
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: node base-scripts/.github/scripts/generate-changeset.mjs
