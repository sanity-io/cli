name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish packages to NPM'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ECOSPARK_APP_ID }}
          private-key: ${{ secrets.ECOSPARK_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - name: Checkout
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        uses: actions/checkout@v6

      - name: Setup Environment
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        uses: ./.github/actions/setup
        with:
          node-version: 20

      - name: Build packages
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        run: pnpm run build:cli

      - name: Set publishing config
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        run: pnpm config set '//registry.npmjs.org/:_authToken' "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Publish packages (latest)
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        run: pnpm publish -r
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Summary
        if: ${{ steps.release.outputs.releases_created == 'true' || github.event.inputs.publish == 'true' }}
        run: |
          echo "## Published Packages 🚀" >> $GITHUB_STEP_SUMMARY
          echo "All CLI packages published:" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| @sanity/cli-core | ${{ steps.release.outputs['packages/@sanity/cli-core--version'] || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| @sanity/cli-test | ${{ steps.release.outputs['packages/@sanity/cli-test--version'] || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| @sanity/cli | ${{ steps.release.outputs['packages/@sanity/cli--version'] || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| @sanity/eslint-config-cli | ${{ steps.release.outputs['packages/@sanity/eslint-config-cli--version'] || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| create-sanity | ${{ steps.release.outputs['packages/create-sanity--version'] || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY

  post-release-steps:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.command == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Mark SDK issues as done
        uses: sanity-labs/mark-issues-done-action@main
        with:
          linear_api_key: ${{secrets.LINEAR_API_KEY}}
          repository_name: ${{github.event.repository.name}}
          # Label: In Staging
          initial_state_id: 'c56956cd-c281-4ca5-889f-6189ce231a6d'
          # Label: Shipped
          done_state_id: '5a35b7bf-6d37-4cc2-854a-2f18d160e2e5'
