name: Publish Preview Packages

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  publish-preview:
    # Only run if PR has 'trigger: preview' label
    if: "contains(github.event.pull_request.labels.*.name, 'trigger: preview')"

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup
        with:
          node-version: 20

      - name: Build CLI packages
        run: pnpm build:cli

      - name: Publish preview packages
        run: |
          pnpm dlx pkg-pr-new publish \
            './packages/@sanity/cli' \
            './packages/@sanity/cli-core' \
            './packages/@sanity/cli-test' \
            './packages/@sanity/eslint-config-cli' \
            --pnpm \
            --json pkg-pr-new-output.json \
            --comment=off \
            --compact
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create or update comment with commit SHA
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = JSON.parse(fs.readFileSync('pkg-pr-new-output.json', 'utf8'));

            const commitSha = context.payload.pull_request.head.sha;
            const shortSha = commitSha.substring(0, 7);
            const identifier = `<!-- pkg-pr-new-commit-${commitSha} -->`;

            // Format package list
            const packages = output.packages
              .map((p) => `- **${p.name}**: \`${p.url}\``)
              .join('\n');

            // Create comment body
            const body = `${identifier}
            ## 📦 Preview Packages

            Preview packages published for commit [\`${shortSha}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${commitSha})

            ### Installation

            \`\`\`bash
            pnpm install ${output.packages.map(p => p.url).join(' ')}
            \`\`\`

            <details>
            <summary>Package URLs</summary>

            ${packages}

            </details>`;

            // Find existing comment with this commit SHA
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existingComment = comments.find(comment =>
              comment.body?.includes(identifier)
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body,
              });
            }
